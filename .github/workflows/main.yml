name: Flights Mon

on:
  schedule:
    - cron: "0 * * * *"

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - run: pip install requests serpapi

      - run: python flightsMon.py
